[tool.flet]
org = "com.telecommunicator"
product = "Telecommunicator"
description = "A Python messenger client"
version = "1.0.0"

[tool.flet.app]
module = "client.main"
assets_dir = "assets"

[build-system]
requires = ["flet[build]>=0.84.0"]
build-backend = "flet.build"

[project]
name = "telecommunicator-client"
version = "1.0.0"
description = "Telecommunicator messenger client"
requires-python = ">=3.11"
dependencies = [
    "flet>=0.84.0",
    "flet-secure-storage>=0.1.0",
    "httpx>=0.27.0",
    "websockets>=12.0",
    "python-i18n[YAML]>=0.3.9",
]
